<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Real Estate AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
        }
        
        .brand-icon { 
            width: 60px; 
            height: 60px; 
            background: #e0e7ff; 
            color: #4361ee; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.8rem; 
            margin: 0 auto 20px; 
        }
        
        .form-control { 
            background-color: #f8fafc; 
            border: 1px solid #e2e8f0; 
            padding: 12px 15px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
        }
        
        .btn-login { 
            background-color: #4361ee; 
            color: white; 
            font-weight: 700; 
            padding: 12px; 
            border-radius: 10px; 
            width: 100%; 
            border: none; 
            transition: 0.3s; 
        }
        .btn-login:hover { background-color: #3a0ca3; transform: translateY(-2px); }
        
        .role-hint { font-size: 0.8rem; color: #94a3b8; margin-top: 20px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
        <h3 class="fw-bold mb-1">Welcome Back</h3>
        <p class="text-muted mb-4 small">Sign in to the Triage System</p>
        
        <form action="/login" method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        
        <div class="role-hint">
            <div class="d-flex justify-content-between">
                <span><strong>Manager:</strong> admin / 1234</span>
                <span><strong>Tenant:</strong> tenant / 1234</span>
            </div>
        </div>
    </div>

</body>
</html>
