<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ticket Details - {{ ticket.ticket_id }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: sans-serif; background: #f4f6f8; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Header Section */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #7f8c8d; font-weight: bold; }
        .back-btn:hover { color: #2c3e50; }

        /* Main Card */
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        
        .card-header { background: #34495e; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ticket-id { font-size: 1.2em; font-weight: bold; }
        
        .card-body { padding: 30px; }
        
        /* Grid Layout for Info */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        
        .info-item label { display: block; font-size: 0.85em; color: #7f8c8d; margin-bottom: 5px; text-transform: uppercase; }
        .info-item span { font-size: 1.1em; color: #2c3e50; font-weight: 500; }

        /* Message Box */
        .message-box { background: #f9f9f9; padding: 20px; border-radius: 4px; border: 1px solid #eee; }
        .message-title { margin-top: 0; color: #2c3e50; }
        .message-text { line-height: 1.6; color: #34495e; white-space: pre-wrap; }

        /* Badges */
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 0.85em; font-weight: bold; color: white; display: inline-block; }
        .urgency-high { background-color: #e74c3c; }
        .urgency-medium { background-color: #f39c12; }
        .urgency-low { background-color: #27ae60; }
        .status-open { background-color: #3498db; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="/" class="back-btn">&larr; Back to Dashboard</a>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="ticket-id">{{ ticket.ticket_id }}</span>
            <span class="badge status-{{ ticket.status }}">{{ ticket.status|upper }}</span>
        </div>
        
        <div class="card-body">
            <!-- AI Classification Info -->
            <div class="info-grid">
                <div class="info-item">
                    <label>Tenant Name</label>
                    <span>{{ ticket.sender_name }}</span>
                </div>
                <div class="info-item">
                    <label>Unit Number</label>
                    <span>{{ ticket.unit_number }}</span>
                </div>
                <div class="info-item">
                    <label>Category (AI)</label>
                    <span>{{ ticket.category|replace('_', ' ')|title }}</span>
                </div>
                <div class="info-item">
                    <label>Urgency (AI)</label>
                    <span class="badge urgency-{{ ticket.urgency }}">{{ ticket.urgency|upper }}</span>
                </div>
            </div>

            <!-- The Actual Message -->
            <div class="message-box">
                <h3 class="message-title">{{ ticket.subject }}</h3>
                <div class="message-text">{{ ticket.message }}</div>
            </div>
            
            <br>
            <p style="text-align: right; color: #999; font-size: 0.9em;">
                Ticket Created: {{ ticket.created_at }}
            </p>
        </div>
    </div>
</div>

</body>
</html>
