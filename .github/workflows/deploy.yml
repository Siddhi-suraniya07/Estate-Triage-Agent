name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          cd Estate-Triage-Agent || exit
          git pull
          sudo docker stop my-app || true
          sudo docker rm my-app || true
          sudo docker build -t my-app .
          sudo docker run -d -p 80:5000 --name my-app -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} my-app