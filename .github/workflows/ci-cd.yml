name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/estate-triage-agent .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/estate-triage-agent

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/estate-triage-agent
          docker stop estate-triage-agent || true
          docker rm estate-triage-agent || true
          docker run -d -p 80:5000 --name estate-triage-agent ${{ secrets.DOCKER_USERNAME }}/estate-triage-agent